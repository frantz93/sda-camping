<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Formulaire de réservation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    /* HEADER AVEC IMAGE */
    .header {
      position: relative;
      height: 300px;
      background: url('cover.png') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* OVERLAY (assombrit l'image) */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
    }

    /* CONTENU DANS LE HEADER */
    .header-content {
      position: relative;
      text-align: center;
      color: white;
    }

    .logo {
      max-width: 120px;
      margin-bottom: 10px;
    }

    .header h1 {
      margin: 0;
      font-size: 32px;
    }

    .header p {
      margin-top: 5px;
      font-size: 16px;
    }

    /* CONTENU PRINCIPAL */
    .container {
      padding: 30px 20px;
      text-align: center;
    }

    .form-container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.1);
    }

    iframe {
      width: 100%;
      height: 750px;
      border: none;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="overlay"></div>

    <div class="header-content">
      <img src="logo.png" alt="Logo" class="logo">
      <h1>Inscription - Camp d'été 2026</h1>
      <p>Complétez le formulaire pour réserver votre séjour</p>
    </div>
  </div>

  <!-- FORMULAIRE -->
  <div class="container">
    <div class="form-container">
      <iframe
        src="https://airtable.com/embed/appmCctZ4vaLJzC4u/shr97TTd7WVTAHBfH">
      </iframe>
    </div>
  </div>

</body>
</html>
